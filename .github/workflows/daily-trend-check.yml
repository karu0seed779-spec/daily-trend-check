name: Daily Trend Check

on:
  schedule:
    # cron記法はUTC基準です。JST = UTC+9。
    - cron: "0 3 * * *" # JST 昼12:00
  workflow_dispatch: {} # 手動実行用（Actionsタブから"Run workflow"で即実行できます）

jobs:
  trend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run daily trend check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/daily-trend-check.js
